server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: any unmatched route falls through to index.html so the
    # client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hash-named static assets — cache aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Don't cache the entry HTML — we want SPA users to pick up new
    # bundle hashes after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss text/xml image/svg+xml;
    gzip_min_length 1024;
}
