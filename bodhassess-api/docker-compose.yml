version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bodh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bodh
      POSTGRES_PASSWORD: Google.com1
      POSTGRES_DB: bodhassess
    ports:
      - "5432:5432"
    volumes:
      - bodh_pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodh -d bodhassess"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bodh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bodh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bodhminio
      MINIO_ROOT_PASSWORD: bodhminio_secret
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - bodh_minio:/data

volumes:
  bodh_pgdata:
  bodh_minio:
