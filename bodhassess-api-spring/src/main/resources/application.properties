# ====== Common config (overridden by application-{dev,prod}.properties) ======
server.port=4000

# ====== JPA / Hibernate ======
# ddl-auto=update lets Hibernate add new tables/columns on startup whenever
# an @Entity changes. It will not drop or rename safely — for those, write
# explicit SQL. Backward-compat columns can be left in place until a real
# cleanup window.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ====== Multipart (file uploads) ======
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ====== Redis (live-tracking heartbeat) ======
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6390}
spring.redis.timeout=2000ms

# heartbeat key TTL must exceed idle threshold so 'idle' is observable
# before the row disappears entirely.
app.heartbeat.ttl-seconds=30
app.heartbeat.idle-threshold-seconds=15

# ====== App / Auth ======
app.auth.tokenSecret=${APP_AUTH_TOKEN_SECRET:926D96C90030DD58429D2751AC1BDBBC555134AB8E61D53A55DCE7D44BD7E55D9E83AEE0B65E5F5BA48D40C09E3F24DE1A05C8E3EF57BD7CF85F8B2C6B9D2A1C}
app.auth.tokenExpirationMsec=${APP_AUTH_TOKEN_EXPIRATION_MSEC:604800000}
app.cors.allowedOrigins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
app.uploads.dir=${APP_UPLOADS_DIR:./uploads}
app.uploads.baseUrl=${APP_UPLOADS_BASE_URL:http://localhost:4000}

# ====== Admin login (single account, env-driven) ======
# Override APP_ADMIN_PASSWORD in production. The credential is the env value
# itself — change & restart to rotate.
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}

# ====== Jackson ======
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ====== Default profile ======
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
