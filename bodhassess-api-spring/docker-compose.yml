services:
  mysql:
    image: mysql:8.0
    container_name: bodhassess-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_NAME:-bodhassess}
      MYSQL_USER: ${DB_USERNAME:-bodh}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bodh}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpw}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bodh

  # Application container — only built/run in prod mode (see run.sh).
  # In dev mode the app runs on the host via mvnw, talking to the
  # container above on localhost:3306.
  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    image: bodhassess-api:latest
    container_name: bodhassess-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-bodhassess}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: ${DB_USERNAME:-bodh}
      DB_PASSWORD: ${DB_PASSWORD:-bodh}
      APP_AUTH_TOKEN_SECRET: ${APP_AUTH_TOKEN_SECRET:-change-me-in-production}
      APP_AUTH_TOKEN_EXPIRATION_MSEC: ${APP_AUTH_TOKEN_EXPIRATION_MSEC:-604800000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_UPLOADS_DIR: /app/uploads
      APP_UPLOADS_BASE_URL: ${APP_UPLOADS_BASE_URL:-http://localhost:4000}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      - app-uploads:/app/uploads
    networks:
      - bodh

networks:
  bodh:
    driver: bridge

volumes:
  mysql-data:
  app-uploads:
