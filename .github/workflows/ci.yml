name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  web:
    name: web — typecheck + build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: bodhassess-app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bodhassess-app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc -b --noEmit
      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com/api/v1

  api:
    name: api — vet + build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: bodhassess-api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: bodhassess-api/go.sum
      - run: go vet ./...
      - run: go build -o /tmp/server ./cmd/server
