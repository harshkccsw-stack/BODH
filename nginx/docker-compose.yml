services:
  nginx:
    image: nginx:latest
    container_name: bodhassess-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - bodh

networks:
  bodh:
    name: bodhassess-api_bodh
    external: true
